<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ロールプレイクイズ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Maru Gothic ProN', sans-serif;
         background: #fff9f0; min-height: 100vh; -webkit-user-select: none; user-select: none; }
  .page { display: none; flex-direction: column; min-height: 100vh; }
  .page.active { display: flex; }

  #pageTop { align-items: center; justify-content: center; gap: 24px; padding: 24px; }
  #pageTop h1 { font-size: 2rem; color: #ff7043; text-align: center; }
  .modeBtn { width: 100%; max-width: 340px; padding: 22px; border: none; border-radius: 24px;
             font-size: 1.4rem; font-weight: bold; cursor: pointer;
             box-shadow: 0 6px 0 rgba(0,0,0,.15); -webkit-tap-highlight-color: transparent; }
  #btnTeacher { background: #42a5f5; color: #fff; }
  #btnStudent  { background: #66bb6a; color: #fff; }

  header { display: flex; align-items: center; gap: 12px; padding: 12px 16px;
           background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.1); flex-shrink: 0; }
  header h2 { font-size: 1.2rem; flex: 1; }
  .backBtn { background: #eee; border: none; border-radius: 12px; padding: 8px 14px;
             font-size: 1rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }

  #pageTeacher header { background: #e3f2fd; }
  .teacherBody { padding: 16px; display: flex; flex-direction: column; gap: 16px;
                 overflow-y: auto; flex: 1; }
  .card { background: #fff; border-radius: 20px; padding: 16px;
          box-shadow: 0 3px 10px rgba(0,0,0,.08); }
  .card > label { font-size: 1rem; font-weight: bold; color: #555; display: block; margin-bottom: 8px; }

  .formSection { margin-bottom: 14px; }
  .formSection small { color: #888; font-size: .9rem; display: block; margin-bottom: 6px; }

  .sceneUpload { width: 100%; height: 160px; border: 3px dashed #90caf9; border-radius: 16px;
                 display: flex; flex-direction: column; align-items: center; justify-content: center;
                 cursor: pointer; background: #f0f8ff; position: relative; overflow: hidden; }
  .sceneUpload img { width: 100%; height: 100%; object-fit: contain; position: absolute; top:0; left:0; }
  .sceneUpload span { font-size: 1rem; color: #90a4ae; text-align: center; position: relative; z-index:1; }
  .sceneUpload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index:2; }

  .cardsGrid { display: flex; flex-direction: column; gap: 12px; }
  .cardRow { background: #f9f9f9; border-radius: 16px; padding: 12px; }
  .cardRow small { font-size: .9rem; font-weight: bold; color: #555; display: block; margin-bottom: 8px; }
  .cardUpload { width: 100%; height: 90px; border: 2px dashed #ccc; border-radius: 12px;
                display: flex; align-items: center; justify-content: center;
                cursor: pointer; background: #fff; position: relative; overflow: hidden; margin-bottom: 8px; }
  .cardUpload img { width: 100%; height: 100%; object-fit: contain; position: absolute; top:0; left:0; }
  .cardUpload span { font-size: .85rem; color: #bbb; text-align: center; position: relative; z-index:1; }
  .cardUpload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index:2; }
  .cardRow input[type=text] { border: 2px solid #ddd; border-radius: 12px; padding: 10px;
                               font-size: 1rem; width: 100%; -webkit-appearance: none; }
  .cardRow input[type=text]:focus { outline: none; border-color: #42a5f5; }

  .answerRadios { display: flex; flex-direction: column; gap: 8px; }
  .answerRadios label { display: flex; align-items: center; gap: 8px; font-size: 1rem;
                        background: #f5f5f5; border-radius: 12px; padding: 12px; cursor: pointer; }
  .answerRadios input[type=radio] { width: 20px; height: 20px; }

  .addBtn { background: #42a5f5; color: #fff; border: none; border-radius: 20px; padding: 16px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #1976d2;
            width: 100%; -webkit-tap-highlight-color: transparent; }
  .goBtn { background: #ff7043; color: #fff; border: none; border-radius: 20px; padding: 16px;
           font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #e64a19;
           width: 100%; -webkit-tap-highlight-color: transparent; }

  .qListItem { background: #fff; border-radius: 16px; padding: 12px;
               box-shadow: 0 2px 6px rgba(0,0,0,.08); display: flex; align-items: center; gap: 10px; }
  .qThumb { width: 52px; height: 52px; border-radius: 10px; object-fit: cover;
            background: #eee; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size:1.4rem; }
  .qThumb img { width:100%; height:100%; object-fit:cover; border-radius:10px; }
  .qInfo { flex: 1; min-width: 0; }
  .qInfo b { font-size: .95rem; }
  .qInfo p { font-size: .8rem; color: #777; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .qDelBtn { background: #ef9a9a; border: none; border-radius: 10px; padding: 6px 10px;
             font-size: .85rem; cursor: pointer; flex-shrink: 0; }

  #pageStudent header { background: #e8f5e9; }
  .studentBody { padding: 16px; display: flex; flex-direction: column; gap: 14px; flex: 1; overflow-y: auto; }
  .progressLabel { text-align: center; font-size: 1rem; font-weight: bold; color: #555; }
  .progressBar { background: #ddd; border-radius: 99px; height: 14px; overflow: hidden; }
  .progressFill { background: #66bb6a; height: 100%; border-radius: 99px; transition: width .3s; }

  #sceneBox { width: 100%; background: #fff; border-radius: 20px; overflow: hidden;
              box-shadow: 0 3px 10px rgba(0,0,0,.1); min-height: 150px;
              display: flex; align-items: center; justify-content: center; }
  #sceneBox img { width: 100%; max-height: 210px; object-fit: contain; }
  #sceneNoImg { color: #bbb; font-size: 1rem; padding: 30px; text-align: center; }

  #dropZone { min-height: 100px; border: 4px dashed #a5d6a7; border-radius: 20px;
              background: #f1f8e9; display: flex; align-items: center; justify-content: center;
              flex-wrap: wrap; gap: 10px; padding: 12px; transition: background .2s; }
  #dropZone.over { background: #c8e6c9; border-color: #66bb6a; }
  .dropLabel { color: #aaa; font-size: 1rem; pointer-events: none; text-align: center; }

  #choicesArea { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .qCard { background: #fff; border-radius: 16px; padding: 8px 4px; text-align: center;
           box-shadow: 0 4px 0 #ddd; cursor: grab; display: flex; flex-direction: column;
           align-items: center; gap: 4px; transition: opacity .2s; -webkit-tap-highlight-color: transparent; }
  .qCard.dragging { opacity: .35; }
  .qCard .cImg { width: 100%; height: 65px; object-fit: contain; border-radius: 8px; pointer-events: none; }
  .qCard .cPh { width: 100%; height: 65px; background: #f0f0f0; border-radius: 8px;
                display: flex; align-items: center; justify-content: center; font-size: 1.6rem; pointer-events: none; }
  .qCard .cWord { font-size: .95rem; font-weight: bold; pointer-events: none; line-height:1.2; }

  .droppedCard { background: #fff; border-radius: 14px; padding: 8px 12px; font-size: 1rem;
                 font-weight: bold; box-shadow: 0 3px 0 #bbb; display: flex;
                 flex-direction: column; align-items: center; gap: 4px; }
  .droppedCard img { width: 56px; height: 56px; object-fit: contain; border-radius: 8px; }

  #checkBtn { background: #ffa726; color: #fff; border: none; border-radius: 20px; padding: 16px;
              font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #e65100;
              width: 100%; -webkit-tap-highlight-color: transparent; }

  #pageResult { align-items: center; justify-content: center; padding: 24px; gap: 20px; background: #fff9f0; }
  .resultBox { background: #fff; border-radius: 24px; padding: 32px; text-align: center;
               box-shadow: 0 4px 20px rgba(0,0,0,.1); width: 100%; max-width: 360px; }
  .rEmoji { font-size: 4rem; }
  .rScore { font-size: 2rem; font-weight: bold; margin: 12px 0; color: #ff7043; }
  .rMsg   { font-size: 1.1rem; color: #555; margin-bottom: 20px; }
  .retryBtn { background: #66bb6a; color: #fff; border: none; border-radius: 16px;
              padding: 14px 32px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }

  #feedback { display: none; position: fixed; inset: 0; z-index: 200;
              align-items: center; justify-content: center; background: rgba(0,0,0,.5); }
  #feedback.show { display: flex; }
  .fbBox { background: #fff; border-radius: 28px; padding: 36px 28px; text-align: center;
           width: 86%; max-width: 340px; }
  .fbEmoji { font-size: 4rem; }
  .fbMsg  { font-size: 1.4rem; font-weight: bold; margin: 12px 0; }
  .fbNext { background: #42a5f5; color: #fff; border: none; border-radius: 16px;
            padding: 14px 32px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

  #noQuizMsg { text-align: center; color: #bbb; padding: 40px 16px; font-size: 1rem; }
</style>
</head>
<body>

<!-- トップ -->
<div id="pageTop" class="page active">
  <h1>🌟 ロールプレイクイズ 🌟</h1>
  <button class="modeBtn" id="btnTeacher">👩‍🏫 せんせいモード<br><small style="font-size:.8rem;font-weight:normal;">もんだいをつくる</small></button>
  <button class="modeBtn" id="btnStudent">🧒 せいとモード<br><small style="font-size:.8rem;font-weight:normal;">クイズをする</small></button>
</div>

<!-- せんせいモード -->
<div id="pageTeacher" class="page">
  <header>
    <button class="backBtn" id="backFromTeacher">◀ もどる</button>
    <h2>👩‍🏫 もんだいをつくる</h2>
  </header>
  <div class="teacherBody">

    <!-- 問題リスト -->
    <div class="card">
      <label>📋 つくったもんだい（<span id="qCount">0</span>もん）</label>
      <div id="qList" style="display:flex;flex-direction:column;gap:10px;margin-top:4px;"></div>
    </div>

    <!-- 新しい問題フォーム -->
    <div class="card" id="formCard">
      <label>➕ あたらしいもんだいをつくる</label>

      <div class="formSection">
        <small>📝 もんだいのタイトル</small>
        <input type="text" id="fTitle" placeholder="れい：ともだちにはなしかけるとき"
               style="border:2px solid #ddd;border-radius:12px;padding:10px;font-size:1rem;width:100%;-webkit-appearance:none;">
      </div>

      <div class="formSection">
        <small>📷 ばめんのイラスト</small>
        <div class="sceneUpload" id="sceneUpload">
          <img id="scenePreview" src="" alt="" style="display:none;">
          <span id="sceneHint">ここをタップしてがぞうをえらぶ</span>
          <input type="file" accept="image/*" id="sceneFile">
        </div>
      </div>

      <div class="formSection">
        <small>🃏 こたえのカード（3まい）</small>
        <div class="cardsGrid" id="cardsGrid"></div>
      </div>

      <div class="formSection">
        <small>⭐ せいかいはどれ？</small>
        <div class="answerRadios" id="answerRadios"></div>
      </div>

      <button class="addBtn" id="addBtn">➕ このもんだいをついかする</button>
    </div>

    <button class="goBtn" id="finishBtn">✅ もんだいをかくていして せいとモードへ</button>
    <button class="goBtn" id="downloadBtn" style="background:#7b1fa2;box-shadow:0 5px 0 #4a148c;">💾 もんだいをほぞんしてダウンロード</button>
  </div>
</div>

<!-- せいとモード -->
<div id="pageStudent" class="page">
  <header>
    <button class="backBtn" id="backFromStudent">◀ もどる</button>
    <h2>🧒 ロールプレイクイズ</h2>
  </header>
  <div class="studentBody">
    <div id="noQuizMsg">まだもんだいがありません。<br>せんせいにもんだいをつくってもらおう！</div>
    <div id="quizWrap" style="display:none;flex-direction:column;gap:14px;">
      <div class="progressLabel" id="progLabel"></div>
      <div class="progressBar"><div class="progressFill" id="progFill"></div></div>
      <div id="sceneBox">
        <img id="sceneImg" src="" alt="" style="display:none;">
        <div id="sceneNoImg">イラストがありません</div>
      </div>
      <p style="font-size:1rem;font-weight:bold;text-align:center;">👇 カードをここにドラッグしよう</p>
      <div id="dropZone"><span class="dropLabel">ここにカードをおとそう</span></div>
      <div id="choicesArea"></div>
      <button id="checkBtn">✅ こたえる！</button>
    </div>
  </div>
</div>

<!-- 結果 -->
<div id="pageResult" class="page">
  <h2 style="font-size:1.8rem;color:#ff7043;">🎊 おわったよ！</h2>
  <div class="resultBox">
    <div class="rEmoji" id="rEmoji"></div>
    <div class="rScore" id="rScore"></div>
    <div class="rMsg"   id="rMsg"></div>
    <button class="retryBtn" id="retryBtn">もういちどやる ▶</button>
  </div>
</div>

<!-- フィードバック -->
<div id="feedback">
  <div class="fbBox">
    <div class="fbEmoji" id="fbEmoji"></div>
    <div class="fbMsg"   id="fbMsg"></div>
    <button class="fbNext" id="fbNext">つぎへ ▶</button>
  </div>
</div>

<script>
// ========== 状態 ==========
var quizList = [];
var currentQ = 0;
var correctCount = 0;
var droppedIdx = null;

// 入力フォームの一時データ
var fScene = null;          // base64 or null
var fCards = [null,null,null]; // base64 or null

// ========== ページ ==========
function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

// ========== 起動時にフォームを動的生成 ==========
function buildForm() {
  // カードグリッド
  var grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  for (var i = 0; i < 3; i++) {
    var row = document.createElement('div');
    row.className = 'cardRow';
    row.innerHTML =
      '<small>カード'+(i+1)+'</small>' +
      '<div class="cardUpload" id="cu'+i+'">' +
        '<img id="ci'+i+'" src="" alt="" style="display:none;">' +
        '<span id="ch'+i+'">タップしてがぞうをえらぶ</span>' +
        '<input type="file" accept="image/*" id="cf'+i+'">' +
      '</div>' +
      '<input type="text" id="ct'+i+'" placeholder="ことば（れい：たのしい）">';
    grid.appendChild(row);
    // クロージャでイベント登録
    (function(idx){
      document.getElementById('cf'+idx).addEventListener('change', function(e){
        var f = e.target.files[0]; if(!f) return;
        readAsBase64(f, function(src){
          fCards[idx] = src;
          var img = document.getElementById('ci'+idx);
          img.src = src; img.style.display = 'block';
          document.getElementById('ch'+idx).style.display = 'none';
        });
      });
    })(i);
  }

  // 正解ラジオ
  var radios = document.getElementById('answerRadios');
  radios.innerHTML = '';
  for (var j = 0; j < 3; j++) {
    var lbl = document.createElement('label');
    lbl.innerHTML = '<input type="radio" name="fAns" value="'+j+'"'+(j===0?' checked':'')+'>  カード'+(j+1);
    radios.appendChild(lbl);
  }
}

// ========== イベント登録 ==========
document.addEventListener('DOMContentLoaded', function(){
  buildForm();

  // 埋め込み問題があれば読み込む
  if(typeof PRESET_QUIZ !== 'undefined' && PRESET_QUIZ.length > 0) {
    quizList = PRESET_QUIZ;
    updateQList();
  }

  document.getElementById('btnTeacher').addEventListener('click', function(){ showPage('pageTeacher'); });
  document.getElementById('btnStudent').addEventListener('click', function(){ startStudent(); });
  document.getElementById('backFromTeacher').addEventListener('click', function(){ showPage('pageTop'); });
  document.getElementById('backFromStudent').addEventListener('click', function(){ showPage('pageTop'); });
  document.getElementById('addBtn').addEventListener('click', addQuiz);
  document.getElementById('finishBtn').addEventListener('click', function(){
    if(quizList.length === 0){ alert('もんだいをすくなくとも1もんついかしてください'); return; }
    startStudent();
  });
  document.getElementById('downloadBtn').addEventListener('click', function(){
    if(quizList.length === 0){ alert('もんだいをすくなくとも1もんついかしてください'); return; }
    downloadWithQuiz();
  });
  document.getElementById('checkBtn').addEventListener('click', checkAnswer);
  document.getElementById('fbNext').addEventListener('click', nextQuestion);
  document.getElementById('retryBtn').addEventListener('click', function(){ startStudent(); });

  // 場面画像
  document.getElementById('sceneFile').addEventListener('change', function(e){
    var f = e.target.files[0]; if(!f) return;
    readAsBase64(f, function(src){
      fScene = src;
      var img = document.getElementById('scenePreview');
      img.src = src; img.style.display = 'block';
      document.getElementById('sceneHint').style.display = 'none';
    });
  });
});

// ========== 問題追加 ==========
function addQuiz() {
  var choices = [];
  for(var i=0; i<3; i++){
    var txt = document.getElementById('ct'+i).value.trim();
    if(!txt){ alert('カード'+(i+1)+'のことばをいれてください'); return; }
    choices.push({ text: txt, img: fCards[i] });
  }
  var ans = document.querySelector('input[name=fAns]:checked');
  var title = document.getElementById('fTitle').value.trim();

  quizList.push({
    title: title,
    scene: fScene,
    choices: choices,   // すでに値コピーされている
    answer: ans ? parseInt(ans.value) : 0
  });

  updateQList();
  clearForm();
  alert('もんだいを'+quizList.length+'もんついかしました！');
}

function clearForm() {
  fScene = null;
  fCards = [null, null, null];
  document.getElementById('fTitle').value = '';

  // 場面画像リセット
  var sp = document.getElementById('scenePreview');
  sp.src = ''; sp.style.display = 'none';
  document.getElementById('sceneHint').style.display = 'block';
  document.getElementById('sceneFile').value = '';

  // カードリセット
  for(var i=0; i<3; i++){
    document.getElementById('ct'+i).value = '';
    var ci = document.getElementById('ci'+i);
    ci.src = ''; ci.style.display = 'none';
    document.getElementById('ch'+i).style.display = 'block';
    document.getElementById('cf'+i).value = '';
  }

  // 正解ラジオリセット
  var r = document.querySelector('input[name=fAns][value="0"]');
  if(r) r.checked = true;
}

function updateQList() {
  document.getElementById('qCount').textContent = quizList.length;
  var list = document.getElementById('qList');
  list.innerHTML = '';
  if(quizList.length === 0){
    list.innerHTML = '<div style="color:#bbb;text-align:center;padding:14px;">まだもんだいがありません</div>';
    return;
  }
  quizList.forEach(function(q, i){
    var item = document.createElement('div');
    item.className = 'qListItem';
    var thumbInner = q.scene
      ? '<img src="'+q.scene+'" alt="">'
      : '🖼️';
    var names = q.choices.map(function(c){ return c.text; }).join(' / ');
    item.innerHTML =
      '<div class="qThumb">'+thumbInner+'</div>' +
      '<div class="qInfo"><b>'+(q.title||'もんだい'+(i+1))+'</b><p>'+names+'</p><p>せいかい：'+q.choices[q.answer].text+'</p></div>' +
      '<button class="qDelBtn" data-i="'+i+'">けす</button>';
    list.appendChild(item);
  });
  list.querySelectorAll('.qDelBtn').forEach(function(btn){
    btn.addEventListener('click', function(){
      quizList.splice(parseInt(btn.dataset.i), 1);
      updateQList();
    });
  });
}

// ========== 生徒モード ==========
function startStudent() {
  currentQ = 0; correctCount = 0;
  showPage('pageStudent');
  loadQ();
}

function loadQ() {
  var noMsg = document.getElementById('noQuizMsg');
  var wrap  = document.getElementById('quizWrap');
  if(quizList.length === 0){ noMsg.style.display='block'; wrap.style.display='none'; return; }
  noMsg.style.display = 'none';
  wrap.style.display  = 'flex';

  var q = quizList[currentQ];
  document.getElementById('progLabel').textContent = (q.title || 'もんだい '+(currentQ+1));
  document.getElementById('progFill').style.width = Math.round((currentQ/quizList.length)*100)+'%';

  var si = document.getElementById('sceneImg');
  var sn = document.getElementById('sceneNoImg');
  if(q.scene){ si.src=q.scene; si.style.display='block'; sn.style.display='none'; }
  else { si.style.display='none'; sn.style.display='block'; }

  droppedIdx = null;
  resetDropZone();

  var order = shuffled([0,1,2]);
  var area = document.getElementById('choicesArea');
  area.innerHTML = '';
  order.forEach(function(i){
    var c = q.choices[i];
    var div = document.createElement('div');
    div.className = 'qCard';
    div.setAttribute('draggable','true');
    div.innerHTML =
      (c.img ? '<img class="cImg" src="'+c.img+'" alt="">' : '<div class="cPh">🃏</div>') +
      '<div class="cWord">'+c.text+'</div>';
    div.addEventListener('dragstart', function(e){
      e.dataTransfer.setData('text/plain', String(i));
      div.classList.add('dragging');
    });
    div.addEventListener('dragend', function(){ div.classList.remove('dragging'); });
    addTouch(div, i);
    area.appendChild(div);
  });
}

function resetDropZone() {
  var old = document.getElementById('dropZone');
  var dz = old.cloneNode(false);   // イベントなしのクリーンなコピー
  dz.id = 'dropZone';
  dz.innerHTML = '<span class="dropLabel">ここにカードをおとそう</span>';
  old.parentNode.replaceChild(dz, old);
  dz.addEventListener('dragover',  function(e){ e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', function(){  dz.classList.remove('over'); });
  dz.addEventListener('drop', function(e){
    e.preventDefault(); dz.classList.remove('over');
    placeCard(parseInt(e.dataTransfer.getData('text/plain')));
  });
}

function placeCard(idx) {
  droppedIdx = idx;
  var c = quizList[currentQ].choices[idx];
  var dz = document.getElementById('dropZone');
  dz.innerHTML = '<div class="droppedCard">' +
    (c.img ? '<img src="'+c.img+'">' : '<span style="font-size:2rem">🃏</span>') +
    '<span>'+c.text+'</span></div>';
}

function checkAnswer() {
  if(droppedIdx === null){ alert('カードをドラッグしてこたえのばしょにおとしてね！'); return; }
  var ok = (droppedIdx === quizList[currentQ].answer);
  if(ok) correctCount++;
  document.getElementById('fbEmoji').textContent = ok ? '☺️' : '😖';
  document.getElementById('fbMsg').textContent   = ok ? 'せいかい！すごい！' : 'ちがうよ！';
  document.getElementById('fbNext').textContent  = (currentQ+1 >= quizList.length) ? 'けっかをみる ▶' : 'つぎへ ▶';
  document.querySelector('.fbBox').style.background = ok ? '#e8f5e9' : '#fce4ec';
  document.getElementById('feedback').classList.add('show');
}

function nextQuestion() {
  document.getElementById('feedback').classList.remove('show');
  currentQ++;
  if(currentQ >= quizList.length) showResult();
  else loadQ();
}

function showResult() {
  showPage('pageResult');
  var t = quizList.length;
  document.getElementById('rEmoji').textContent = correctCount >= t/2 ? '☺️' : '😖';
  document.getElementById('rScore').textContent = correctCount+' / '+t+' もんせいかい！';
  document.getElementById('rMsg').textContent   = correctCount===t ? 'ぜんもんせいかい！すごい！' : 'またちょうせんしよう！';
}

// ========== タッチドラッグ ==========
function addTouch(el, idx) {
  var clone=null, sx, sy;
  el.addEventListener('touchstart', function(e){
    var t=e.touches[0]; sx=t.clientX; sy=t.clientY;
    var r=el.getBoundingClientRect();
    clone=el.cloneNode(true);
    clone.style.cssText='position:fixed;z-index:999;opacity:.8;pointer-events:none;width:'+el.offsetWidth+'px;left:'+r.left+'px;top:'+r.top+'px;margin:0';
    document.body.appendChild(clone);
    el.classList.add('dragging');
  },{passive:true});
  el.addEventListener('touchmove', function(e){
    if(!clone) return; e.preventDefault();
    var t=e.touches[0];
    clone.style.transform='translate('+(t.clientX-sx)+'px,'+(t.clientY-sy)+'px)';
    var dz=document.getElementById('dropZone'), r=dz.getBoundingClientRect();
    dz.classList.toggle('over', t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom);
  },{passive:false});
  el.addEventListener('touchend', function(e){
    if(!clone) return;
    var t=e.changedTouches[0], dz=document.getElementById('dropZone'), r=dz.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom) placeCard(idx);
    clone.remove(); clone=null;
    el.classList.remove('dragging'); dz.classList.remove('over');
  },{passive:true});
}

function downloadWithQuiz() {
  var html = document.documentElement.outerHTML;
  var inject = '<script>var PRESET_QUIZ = ' + JSON.stringify(quizList) + ';<\/script>';
  html = html.replace('<\/body>', inject + '<\/body>');
  var blob = new Blob([html], { type: 'text/html' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'quiz.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ========== ユーティリティ ==========
function readAsBase64(file, cb) {
  var r = new FileReader();
  r.onload = function(e){ cb(e.target.result); };
  r.readAsDataURL(file);
}

function shuffled(arr) {
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=a[i];a[i]=a[j];a[j]=tmp; }
  return a;
}
